<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Luxury by Darlin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#F8F5F0;
  color:#2B2622;
}

.topbar{
  padding:15px;
  text-align:center;
  background:#fff;
  border-bottom:1px solid #eee;
}

.logo img{
  height:50px;
}

.search{
  padding:10px;
  width:90%;
  margin:10px auto;
  display:block;
  border-radius:10px;
  border:1px solid #ddd;
}

.container{
  padding:16px;
  max-width:1100px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
  border:1px solid #eee;
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:contain;
  cursor:pointer;
}

.name{
  font-weight:bold;
  margin-top:8px;
}

.brand{
  font-size:13px;
  color:#777;
}

.btn{
  display:block;
  text-align:center;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  text-decoration:none;
  font-weight:bold;
}

.whatsapp{
  background:#D9B87A;
  color:#000;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

/* mobile */
@media(max-width:600px){
  .card img{
    height:260px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="https://i.imgur.com/8Km9tLL.png">
  </div>
</div>

<input type="text" id="search" class="search" placeholder="Buscar perfume...">

<div class="container">
  <div id="products" class="grid"></div>
</div>

<div id="modal" class="modal">
  <img id="modalImg">
</div>

<script>
const WHATSAPP="18294755065";
let products=[];

async function load(){
  const res=await fetch("catalogo.txt");
  const text=await res.text();
  products=text.split("\n").map(l=>{
    const p=l.split("|").map(x=>x.trim());
    return {
      brand:p[0],
      name:p[1],
      size:p[2],
      gender:p[3],
      note:p[4],
      img:p[5]
    }
  });
  render(products);
}

function render(list){
  const wrap=document.getElementById("products");
  wrap.innerHTML="";

  list.forEach(p=>{
    const msg=`Hola, quiero este perfume: ${p.name}`;

    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${p.img||''}">
      <div class="name">${p.name}</div>
      <div class="brand">${p.brand}</div>
      <div>${p.size}</div>
      <a class="btn whatsapp" href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}" target="_blank">
        Lo quiero
      </a>
    `;
    wrap.appendChild(div);
  });
}

/* buscar */
document.getElementById("search").addEventListener("input",e=>{
  const val=e.target.value.toLowerCase();
  const filtered=products.filter(p=>
    (p.name||"").toLowerCase().includes(val) ||
    (p.brand||"").toLowerCase().includes(val)
  );
  render(filtered);
});

/* modal imagen */
document.addEventListener("click",e=>{
  if(e.target.tagName==="IMG"){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalImg").src=e.target.src;
  }
});

document.getElementById("modal").onclick=()=>{
  document.getElementById("modal").style.display="none";
};

load();
</script>

</body>
</html>
