<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LUXURY BY DARLIN</title>

<style>
body{margin:0;font-family:Arial;background:#F8F5F0;color:#2B2622}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid #ddd}
.logo img{height:40px}
.container{padding:16px;max-width:1100px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.card{background:#fff;border-radius:16px;padding:12px;border:1px solid #eee}
.card img{width:100%;height:200px;object-fit:contain;cursor:pointer}
.name{font-weight:bold;margin:8px 0}
.btn{display:block;text-align:center;padding:10px;border-radius:10px;margin-top:8px;text-decoration:none;font-weight:bold}
.whatsapp{background:#D9B87A;color:#000}

/* modal imagen */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center}
.modal img{max-width:90%;max-height:90%}

/* mobile */
@media(max-width:600px){
.card img{height:240px}
}
</style>
</head>

<body>

<header class="topbar">
<div class="logo">
<img src="https://i.imgur.com/8Km9tLL.png">
</div>
</header>

<div class="container">
<div id="products" class="grid"></div>
</div>

<div id="modal" class="modal">
<img id="modalImg">
</div>

<script>
const WHATSAPP="18294755065";

let products=[];

async function load(){
  const res=await fetch("catalogo.txt");
  const text=await res.text();
  const lines=text.split("\n");

  products=lines.map(l=>{
    const p=l.split("|").map(x=>x.trim());
    return {
      brand:p[0],
      name:p[1],
      size:p[2],
      gender:p[3],
      note:p[4],
      img:p[5]
    }
  });

  render();
}

function render(){
  const wrap=document.getElementById("products");
  wrap.innerHTML="";

  products.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    const msg=`Hola, quiero este perfume: ${p.name}`;

    card.innerHTML=`
      <img src="${p.img||''}">
      <div class="name">${p.name}</div>
      <div>${p.brand}</div>
      <div>${p.size}</div>
      <a class="btn whatsapp" href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}" target="_blank">
        Lo quiero
      </a>
    `;

    wrap.appendChild(card);
  });
}

/* modal */
document.addEventListener("click",e=>{
  if(e.target.tagName==="IMG"){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalImg").src=e.target.src;
  }
});

document.getElementById("modal").onclick=()=>{
  document.getElementById("modal").style.display="none";
};

load();
</script>

</body>
</html>
